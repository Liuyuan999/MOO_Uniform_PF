# Surrogate CDF run that starts from outer_iter_4 behavior:
# - Resume state is bootstrapped from copied outer_iter_0..3 directories in run_root.
# - outer_iter_4+ then runs CDF updates.
# - Endpoint reuse pulls slot 0 and slot N from LS run when available.

run_name: cdf-refinement-surrogate-from-ls-start4
output_root: outputs/cdf_refinement

seed: 0
num_outer_iters: 15
num_segments: 5
alpha: 0.3

cdf_grid_size: 2001
use_pchip: true
monotone_eps: 1.0e-8
force_endpoints: true

execution:
  mode: parallel
  max_concurrent_jobs: 4
  pipeline_endpoints: true

warm_start:
  strategy: same_index_then_nearest
  allow_endpoint_interp: true
  explicit_init_adapter: null
  apply_explicit_every_outer_iter: false
  init_adapters_by_slot: null

inner_loop:
  budget_mode: epochs
  budget_value: 1
  num_processes: 1

evaluation:
  pf_source: training_log
  tail_fraction: 0.2
  objective_coordinates: raw_rewards
  deterministic_decoding: true
  max_eval_samples: 512
  split: train

resume:
  enabled: true
  run_root: outputs/cdf_refinement/cdf-refinement-surrogate-from-ls-start4
  require_config_match: true

endpoint_reuse:
  enabled: true
  source_run_root: outputs/ls_uniform/ls-uniform-demo
  # For this start-from-4 flow, outer_iter_0 all-slot reuse is not needed.
  reuse_all_slots_on_outer0: false
  fallback_when_missing: train

ppo_config_paths:
  - configs/model/qwen_0p5b_dora.yaml
  - configs/task/reddit_summarization.yaml
  - configs/rl/ppo.yaml
  - configs/eval/default.yaml

ppo_overrides:
  rl:
    adaptive_kl: false
    init_kl_coef: 0.05
